<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — Work Report System</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F6F4EF;color:#14141A;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
  .card{background:#fff;border:1px solid #E7E4DA;border-radius:16px;padding:2.5rem 2rem;text-align:center;max-width:340px;box-shadow:0 4px 20px rgba(16,25,58,0.08)}
  .icon{width:64px;height:64px;border-radius:16px;background:#10193A;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 1.2rem}
  h1{font-size:17px;font-weight:800;color:#10193A;margin-bottom:.5rem}
  p{font-size:13px;color:#696B78;line-height:1.5;margin-bottom:1.4rem}
  button{padding:10px 22px;border:none;border-radius:9px;background:#FF7A1A;color:#fff;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}
  button:hover{background:#E86C10}
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>This page needs an internet connection. Check your connection and try again — your previously loaded data is safe.</p>
    <button onclick="window.location.reload()">↻ Retry</button>
  </div>
</body>
</html>
