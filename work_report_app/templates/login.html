<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Work Report System</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    .card{background:#fff;border:1px solid #e0dfd8;border-radius:16px;padding:2.4rem 2rem;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
    .icon{width:54px;height:54px;background:#e6f1fb;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 1.2rem}
    h1{font-size:20px;font-weight:600;text-align:center;color:#1a1a18;margin-bottom:4px}
    .sub{font-size:13px;color:#73726c;text-align:center;margin-bottom:1.8rem}
    label{display:block;font-size:13px;color:#5a5a56;font-weight:500;margin-bottom:5px}
    input{width:100%;padding:10px 12px;font-size:14px;border:1px solid #ddddd5;border-radius:8px;outline:none;font-family:inherit;background:#f9f9f6;margin-bottom:14px;transition:border-color .15s,box-shadow .15s}
    input:focus{border-color:#378add;box-shadow:0 0 0 3px rgba(55,138,221,0.12);background:#fff}
    .btn{width:100%;padding:11px;background:#1a1a18;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
    .btn:hover{background:#333}
    .error{background:#fcebeb;color:#791f1f;border:1px solid #f09595;border-radius:7px;padding:9px 12px;font-size:13px;margin-bottom:14px}
    .hint{background:#f0f0ea;border-radius:8px;padding:10px 12px;font-size:12px;color:#73726c;margin-top:14px;line-height:1.6}
  </style>
</head>
<body>
<div class="card">
  <div class="icon">📋</div>
  <h1>Work Report System</h1>
  <p class="sub">Imax Solution &amp; Conneqtor Technology</p>
  {% if error %}<div class="error">⚠️ {{ error }}</div>{% endif %}
  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" placeholder="Enter your username" required autocomplete="username">
    <label>Password</label>
    <input type="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
    <button class="btn" type="submit">Login →</button>
  </form>
  <div class="hint">
    <strong>Manager:</strong> username = manager<br>
    <strong>Employees:</strong> use your assigned username
  </div>
</div>
</body>
</html>
