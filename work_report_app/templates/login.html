<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#10193A">
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" type="image/png" href="/static/icons/favicon.png">
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WorkReport">
<title>Login — Work Report System</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#0B1024;
    background-image:
      radial-gradient(circle at 15% 15%, rgba(255,106,31,.22), transparent 42%),
      radial-gradient(circle at 88% 82%, rgba(45,107,249,.20), transparent 42%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.25rem;color:#181B2E;
  }
  .card{
    background:#FFFFFF;border-radius:22px;padding:2.6rem 2.2rem;width:100%;max-width:400px;
    box-shadow:0 28px 64px rgba(8,12,32,0.4);position:relative;overflow:hidden;
  }
  .card::before{
    content:"";position:absolute;top:0;left:0;right:0;height:6px;
    background:linear-gradient(90deg,#FF6A1F,#2D6BF9);
  }
  .icon{
    width:58px;height:58px;background:linear-gradient(155deg,#16224C,#0B1024);border-radius:16px;display:flex;align-items:center;
    justify-content:center;font-size:27px;margin:0 auto 1.3rem;color:#FF8A3D;
    box-shadow:0 10px 24px rgba(11,16,36,.35), inset 0 1px 0 rgba(255,255,255,.06);
  }
  h1{font-size:21px;font-weight:850;text-align:center;color:#10193A;margin-bottom:4px;letter-spacing:-.01em}
  .sub{font-size:12.5px;color:#5A5E76;text-align:center;margin-bottom:1.9rem;font-weight:500}
  label{display:block;font-size:11.5px;color:#10193A;font-weight:800;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
  input{
    width:100%;padding:11px 13px;font-size:14.5px;border:1.5px solid #E8E4D8;border-radius:11px;outline:none;
    font-family:inherit;background:#F2EFE6;margin-bottom:14px;transition:border-color .15s,box-shadow .15s,background .15s;
  }
  input:focus{border-color:#FF6A1F;box-shadow:0 0 0 4px rgba(255,106,31,.14);background:#fff}
  .btn{
    width:100%;padding:13px;border:none;border-radius:11px;font-size:14.5px;
    background:linear-gradient(155deg,#FF8A3D,#FF6A1F);color:#2B0F00;
    font-weight:800;cursor:pointer;font-family:inherit;transition:box-shadow .15s,transform .1s;letter-spacing:.01em;
    box-shadow:0 10px 24px rgba(255,106,31,.32), inset 0 1px 0 rgba(255,255,255,.35);
  }
  .btn:hover{box-shadow:0 12px 30px rgba(255,106,31,.42), inset 0 1px 0 rgba(255,255,255,.35)}
  .btn:active{transform:scale(.98)}
  .error{background:#FBE0DF;color:#9A2A2D;border:1px solid #F2B2B3;border-radius:10px;padding:10px 13px;font-size:13px;margin-bottom:14px;font-weight:600}
  .hint{background:#F2EFE6;border-radius:11px;padding:12px 14px;font-size:12px;color:#5A5E76;margin-top:16px;line-height:1.7;border:1px solid #E8E4D8}
  .hint strong{color:#10193A}
  @media(min-width:700px){
    .card{max-width:430px;padding:3rem 2.6rem}
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📋</div>
  <h1>Work Report System</h1>
  <p class="sub">Imax Solution &amp; Conneqtor Technology</p>
  {% if error %}<div class="error">⚠️ {{ error }}</div>{% endif %}
  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" placeholder="Enter your username" required autocomplete="username">
    <label>Password</label>
    <input type="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
    <button class="btn" type="submit">Login →</button>
  </form>
  <div class="hint">
    <strong>Manager:</strong> username = manager<br>
    <strong>Employees:</strong> use your assigned username
  </div>
</div>
<script>

</script>
<script src="/static/push.js"></script>
</body>
</html>
