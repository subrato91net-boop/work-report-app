<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Access — Work Report System</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#10193A;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(255,122,26,0.18), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(45,127,249,0.18), transparent 40%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.25rem;color:#14141A;
  }
  .card{
    background:#FFFFFF;border-radius:20px;padding:2.6rem 2.2rem;width:100%;max-width:400px;
    box-shadow:0 24px 60px rgba(8,12,32,0.35);position:relative;overflow:hidden;text-align:center;
  }
  .card::before{
    content:"";position:absolute;top:0;left:0;right:0;height:6px;
    background:linear-gradient(90deg,#FF7A1A,#2D7FF9);
  }
  .icon{
    width:56px;height:56px;background:#10193A;border-radius:14px;display:flex;align-items:center;
    justify-content:center;font-size:26px;margin:0 auto 1.3rem;color:#FF7A1A;
    box-shadow:0 8px 20px rgba(16,25,58,0.3);
  }
  h1{font-size:20px;font-weight:800;color:#10193A;margin-bottom:8px;letter-spacing:-.01em}
  p{font-size:13px;color:#696B78;font-weight:500;margin-bottom:1.8rem;line-height:1.5}
  .btn{
    display:inline-block;padding:12px 20px;background:#10193A;color:#fff;border:none;border-radius:10px;
    font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;letter-spacing:.01em;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🔒</div>
    <h1>No Features Available</h1>
    <p>Hi {{ name }}, your account doesn't currently have access to any section of this app. Please contact your administrator to have access enabled.</p>
    <a href="/logout" class="btn">Logout</a>
  </div>
</body>
</html>
